name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the GitHub release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history so goreleaser can generate the changelog

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: '~> v2'
          args: release --clean
        env:
          # Release is published to this repo (Kong/kuma-migrator); the workflow's
          # built-in token with `contents: write` is sufficient. The Homebrew cask is
          # pushed to bcollard/homebrew-kuma-migrator, which still needs a cross-repo PAT.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
